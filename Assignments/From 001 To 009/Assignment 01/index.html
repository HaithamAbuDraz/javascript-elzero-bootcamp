<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Learn JavaScript</title>
    <script>
      // Code One
      document.getElementById("el").style.color = "red";
    </script>
    <script>
      // Code Two
      window.onload = function () {
        document.getElementById("el").style.color = "red";
      };
    </script>
  </head>
  <body>
    <h1 id="el">Page Title</h1>
    <script>
      // Code Three
      document.getElementById("el").style.color = "red";
    </script>
  </body>
</html>

<!--
  ============================================================================
  MULTI-LINE COMMENT (EXPLANATION IN ENGLISH)
  ============================================================================

  The code that will NOT work as intended is: Code One

  Reason:
  Code One is placed inside the <head> section before the <body> has been parsed.
  At the moment Code One executes, the DOM element with id="el" (the <h1> tag)
  does not yet exist because the browser has not reached that part of the HTML.
  Therefore, document.getElementById("el") returns null, and trying to access
  .style.color on null will throw a JavaScript error, preventing the color
  from being applied.

  In contrast:
  - Code Two is wrapped inside window.onload, which ensures the code runs only
    after the entire page (including all DOM elements) has finished loading.
    Thus, the element exists and the color changes successfully.

  - Code Three is placed just after the <h1> element in the <body>. At this point,
    the <h1> has already been parsed and exists in the DOM, so the code executes
    correctly and changes the color to red.

  Therefore, due to the timing of execution and the state of the DOM, Code One
  will fail while Code Two and Code Three will work properly.
  ============================================================================
-->
